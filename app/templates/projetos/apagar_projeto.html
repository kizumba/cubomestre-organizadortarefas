{% extends 'base.html' %}
{% load bootstrap4 %}

{% block page_title %}
Projeto
{% endblock %}

{% block content %}

<h1>Apagar Projeto</h1>
<p>Você deseja realmente apagar o projeto <b>{{projeto.nome}}</b>?</p>
<form method="post">
    {% csrf_token %}
    <input type="submit" value="Apagar" class="btn btn-danger">
    <a href="{% url 'lista_projetos' %}" class="btn btn-secondary">Voltar</a>
</form>

{% endblock %}
