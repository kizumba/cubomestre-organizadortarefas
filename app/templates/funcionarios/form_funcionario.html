{% extends 'base.html' %}
{% load bootstrap4 %}

{% block page_title %}
Funcionários
{% endblock %}

{% block content %}

<h1>Cadastro de Funcionário</h1>
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    {% bootstrap_form endereco_form %}
    <input type="submit" value="Salvar" class="btn btn-primary">
    <a href="{% url 'lista_funcionarios' %}" class="btn btn-secondary">Voltar</a>
</form>

{% endblock %}
