{% extends 'base.html' %}
{% load bootstrap4 %}

{% block page_title %}
Cliente
{% endblock %}

{% block content %}

<h1>Apagar Cliente</h1>
<p>Você deseja realmente apagar o cliente <b>{{object.nome}}</b>?</p>
<form method="post">
    {% csrf_token %}
    <input type="submit" value="Apagar" class="btn btn-danger">
    <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">Voltar</a>
</form>

{% endblock %}
