{% extends 'base.html' %}
{% load bootstrap4 %}

{% block page_title %}
Tipos de Funcionários
{% endblock %}

{% block content %}

<h1>Tipos de Funcionários</h1>
<form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <input type="submit" value="Salvar" class="btn btn-primary">
    <a href="{% url 'lista_tipo_funcionarios' %}" class="btn btn-secondary">Voltar</a>
</form>

{% endblock %}
