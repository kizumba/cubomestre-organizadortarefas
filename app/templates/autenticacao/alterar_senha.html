{% extends 'base.html' %}
{% load bootstrap4 %}


{% block page_title %}
Alterar Senha
{% endblock %}

{% block content %}

<div class="container">
    <h1>Alterar Senha</h1>
    <form method="post">
        {% csrf_token %}
        {% bootstrap_form form %}
        <input type="submit" class="btn btn-primary" value="Alterar senha">
        <a href="{% url 'home' %}" class="btn btn-secondary">Voltar</a>
    </form>
</div>

{% endblock %}
