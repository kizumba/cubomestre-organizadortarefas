{% extends 'base.html' %}
{% load bootstrap4 %}


{% block page_title %}
Login
{% endblock %}

{% block content %}

<div class="container">
  {% if error %}
  <span style="color: red">{{error}}</span>
  {% endif %}
  <br>
  <form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <input type="submit" class="btn btn-primary" value="Entrar">
  </form>  
</div>

{% endblock %}
